<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | Caramel Cake Delivery Newtown</title>
  <meta name="description" content="Set a new password for your Caramel Cake Shop account." />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="auth-page">
  <nav class="navbar" id="navbar">
  <a class="navbar-brand" href="index.html">
    <div class="logo-icon">C</div>
    <span>Caramel</span>
  </a>
  </nav>
  <div class="auth-card fade-up">
    <div class="auth-logo">
      <h1>Reset Password</h1>
      <p>Enter your new password below</p>
    </div>

    <!-- Error / Success -->
    <div id="auth-error" class="alert alert-error" style="display:none"></div>
    <div id="auth-success" class="alert alert-success" style="display:none"></div>

    <!-- Reset Form -->
    <form id="reset-form" onsubmit="handleReset(event)">
      <div class="form-group">
        <label class="form-label" for="password">New Password <span class="required">*</span></label>
        <input id="password" type="password" class="form-control" placeholder="Enter new password" required autocomplete="new-password" minlength="6" />
      </div>

      <button type="submit" class="btn btn-primary btn-full" id="btn-submit">
        <span id="btn-text">Update Password</span>
      </button>
    </form>

    <div class="auth-footer">
      Remembered it? <a href="login.html">Back to Login</a>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container" id="toast-container"></div>

<script src="supabase.js"></script>
<script>
  // ---- Navbar Scroll ----
  window.addEventListener('scroll', () => {
    const navbar = document.getElementById('navbar');
    if (navbar && window.scrollY > 10) {
      navbar.classList.add('scrolled');
    } else if (navbar) {
      navbar.classList.remove('scrolled');
    }
  });

  // Verify hash
  (async () => {
    // Supabase sets the session automatically when returning from a recovery link
    const { data: { session } } = await _supabase.auth.getSession();
    
    const hashParams = new URLSearchParams(window.location.hash.substring(1));
    if (hashParams.has('error')) {
      const errorDesc = hashParams.get('error_description') || 'Invalid or expired link.';
      showError('Error: ' + errorDesc.replace(/\+/g, ' ') + '. Please go back to login and request a new reset link.');
      document.getElementById('btn-submit').disabled = true;
      return;
    }

    // If we don't have a session, and there's no hash with recovery, they shouldn't be here
    if (!session && !hashParams.has('type')) {
      showError('Invalid or expired password reset link. Please request a new one.');
      document.getElementById('btn-submit').disabled = true;
    }
  })();

  async function handleReset(e) {
    e.preventDefault();
    clearAlerts();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('btn-submit');
    const btnText = document.getElementById('btn-text');

    btn.disabled = true;
    btnText.textContent = 'Updating...';

    const { error } = await _supabase.auth.updateUser({ password: password });

    if (error) {
      showError(error.message);
      btn.disabled = false;
      btnText.textContent = 'Update Password';
      return;
    }

    showSuccess('Password updated successfully! Redirecting...');
    setTimeout(() => {
      window.location.href = 'index.html';
    }, 1500);
  }

  function showError(msg) {
    const el = document.getElementById('auth-error');
    el.innerHTML = `❌ ${msg}`;
    el.style.display = 'flex';
  }

  function showSuccess(msg) {
    const el = document.getElementById('auth-success');
    el.innerHTML = `✅ ${msg}`;
    el.style.display = 'flex';
  }

  function clearAlerts() {
    document.getElementById('auth-error').style.display = 'none';
    document.getElementById('auth-success').style.display = 'none';
  }
</script>
</body>
</html>
