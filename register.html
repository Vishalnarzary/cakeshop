<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cake Shop — Create Account</title>
  <meta name="description" content="Create a new Cake Shop account to start purchasing products." />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="auth-page">
  <div class="auth-card fade-up">
    <div class="auth-logo">
      <div class="icon">✨</div>
      <h1>Join Cake Shop</h1>
      <p>Create your account in seconds</p>
    </div>

    <div id="auth-error" class="alert alert-error" style="display:none"></div>
    <div id="auth-success" class="alert alert-success" style="display:none"></div>

    <form id="register-form" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label class="form-label" for="name">Full Name <span class="required">*</span></label>
        <input id="name" type="text" class="form-control" placeholder="Your full name" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email Address <span class="required">*</span></label>
        <input id="email" type="email" class="form-control" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password <span class="required">*</span></label>
        <input id="password" type="password" class="form-control" placeholder="Min. 8 characters" required minlength="8" />
      </div>
      <div class="form-group">
        <label class="form-label" for="confirm-password">Confirm Password <span class="required">*</span></label>
        <input id="confirm-password" type="password" class="form-control" placeholder="Repeat your password" required />
      </div>

      <button type="submit" class="btn btn-primary btn-full" id="btn-submit">
        <span id="btn-text">Create Account</span>
      </button>
    </form>

    <!-- OTP Verification Form (Hidden initially) -->
    <form id="otp-verify-form" onsubmit="handleVerifyOtp(event)" style="display:none;">
      <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 16px;">We just sent a 6-digit code to your email. Enter it below to confirm your account.</p>
      <div class="form-group">
        <label class="form-label" for="otp-code">Verification Code <span class="required">*</span></label>
        <input id="otp-code" type="text" class="form-control" placeholder="123456" required autocomplete="one-time-code" maxlength="6" pattern="[0-9]{6}" style="text-align: center; letter-spacing: 4px; font-size: 1.2rem; padding: 12px;" />
      </div>

      <button type="submit" class="btn btn-primary btn-full" id="btn-verify">
        <span id="btn-verify-text">Confirm & Login</span>
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>

<script src="supabase.js"></script>
<script>
  // Redirect if already logged in
  (async () => {
    const { data: { session } } = await _supabase.auth.getSession();
    if (session) window.location.href = 'index.html';
  })();

  let currentSignupEmail = '';
  let currentSignupName = '';

  async function handleRegister(e) {
    e.preventDefault();
    clearAlerts();

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm-password').value;

    if (password !== confirm) {
      showError('Passwords do not match.');
      return;
    }

    const btn = document.getElementById('btn-submit');
    const btnText = document.getElementById('btn-text');
    btn.disabled = true;
    btnText.textContent = 'Creating account...';

    // Sign up with Supabase Auth
    const { data, error } = await _supabase.auth.signUp({
      email,
      password,
      options: { data: { name } }
    });

    if (error) {
      console.error("Signup error details:", error);
      showError(error.message || error.error_description || JSON.stringify(error));
      btn.disabled = false;
      btnText.textContent = 'Create Account';
      return;
    }

    currentSignupEmail = email;
    currentSignupName = name;

    // Show OTP form, hide register form
    document.getElementById('register-form').style.display = 'none';
    document.getElementById('otp-verify-form').style.display = 'block';
    showSuccess('Code sent! Please check your email.');
  }

  async function handleVerifyOtp(e) {
    e.preventDefault();
    clearAlerts();

    const token = document.getElementById('otp-code').value.trim();
    const btn = document.getElementById('btn-verify');
    const btnText = document.getElementById('btn-verify-text');

    btn.disabled = true;
    btnText.textContent = 'Verifying...';

    const { data, error } = await _supabase.auth.verifyOtp({ 
      email: currentSignupEmail,
      token: token,
      type: 'signup'
    });

    if (error) {
      showError(error.message);
      btn.disabled = false;
      btnText.textContent = 'Confirm & Login';
      return;
    }

    // Trigger creates profile automatically so we don't need to insert here

    showSuccess('Account confirmed! Redirecting...');
    setTimeout(() => window.location.href = 'index.html', 1500);
  }

  function showError(msg) {
    const el = document.getElementById('auth-error');
    el.textContent = `❌ ${msg}`;
    el.style.display = 'flex';
  }

  function showSuccess(msg) {
    const el = document.getElementById('auth-success');
    el.textContent = `✅ ${msg}`;
    el.style.display = 'flex';
  }

  function clearAlerts() {
    document.getElementById('auth-error').style.display = 'none';
    document.getElementById('auth-success').style.display = 'none';
  }
</script>
</body>
</html>
