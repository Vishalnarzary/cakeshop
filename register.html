<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cake Shop — Create Account</title>
  <meta name="description" content="Create a new Cake Shop account to start purchasing products." />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="auth-page">
  <div class="auth-card fade-up">
    <div class="auth-logo">
      <div class="icon">✨</div>
      <h1>Join Cake Shop</h1>
      <p>Create your account in seconds</p>
    </div>

    <div id="auth-error" class="alert alert-error" style="display:none"></div>
    <div id="auth-success" class="alert alert-success" style="display:none"></div>

    <form id="register-form" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label class="form-label" for="name">Full Name <span class="required">*</span></label>
        <input id="name" type="text" class="form-control" placeholder="Your full name" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email Address <span class="required">*</span></label>
        <input id="email" type="email" class="form-control" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password <span class="required">*</span></label>
        <input id="password" type="password" class="form-control" placeholder="Min. 8 characters" required minlength="8" />
      </div>
      <div class="form-group">
        <label class="form-label" for="confirm-password">Confirm Password <span class="required">*</span></label>
        <input id="confirm-password" type="password" class="form-control" placeholder="Repeat your password" required />
      </div>

      <button type="submit" class="btn btn-primary btn-full" id="btn-submit">
        <span id="btn-text">Create Account</span>
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>

<script src="supabase.js"></script>
<script>
  // Redirect if already logged in
  (async () => {
    const { data: { session } } = await _supabase.auth.getSession();
    if (session) window.location.href = 'index.html';
  })();

  async function handleRegister(e) {
    e.preventDefault();
    clearAlerts();

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm-password').value;

    if (password !== confirm) {
      showError('Passwords do not match.');
      return;
    }

    const btn = document.getElementById('btn-submit');
    const btnText = document.getElementById('btn-text');
    btn.disabled = true;
    btnText.textContent = 'Creating account...';

    // Sign up with Supabase Auth
    const { data, error } = await _supabase.auth.signUp({
      email,
      password,
      options: { data: { name } }
    });

    if (error) {
      console.error("Signup error details:", error);
      showError(error.message || error.error_description || JSON.stringify(error));
      btn.disabled = false;
      btnText.textContent = 'Create Account';
      return;
    }

    // Insert profile row
    if (data.user) {
      await _supabase.from('profiles').insert({
        id: data.user.id,
        email,
        name,
        role: 'user'
      });
    }

    showSuccess('Account created! Redirecting to login...');
    setTimeout(() => window.location.href = 'login.html', 1500);
  }

  function showError(msg) {
    const el = document.getElementById('auth-error');
    el.innerHTML = `❌ ${msg}`;
    el.style.display = 'flex';
  }

  function showSuccess(msg) {
    const el = document.getElementById('auth-success');
    el.innerHTML = `✅ ${msg}`;
    el.style.display = 'flex';
  }

  function clearAlerts() {
    document.getElementById('auth-error').style.display = 'none';
    document.getElementById('auth-success').style.display = 'none';
  }
</script>
</body>
</html>
