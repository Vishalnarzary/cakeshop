name: Playwright Tests

# Trigger: Run on every push to any branch, and on every pull request
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Check out your code ────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ─────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── 3. Install dependencies ───────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── 4. Install Playwright browsers ───────────────────────
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Validate test database secrets
        run: node scripts/validate-ci-config.js
        env:
          TEST_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          TEST_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
          TEST_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}

      # ── 5. Prepare Local Server with Test Database ────────────
      # We overwrite supabase.js to ensure the frontend uses
      # the TEST database credentials instead of production data
      - name: Inject Test Database Credentials
        run: |
          node scripts/write-test-supabase-config.js
          
          # We use localhost for tests to avoid polluting production
          echo "SITE_URL=http://localhost:3000" >> $GITHUB_ENV
        env:
          TEST_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          TEST_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}

      # ── 6. Run Playwright tests ───────────────────────────────
      - name: Run Playwright tests
        run: |
          # Start a static file server in the background
          npx --yes serve . -p 3000 &
          # Give it a second to start
          sleep 2
          # Run the tests against the local server
          npx playwright test
        env:
          TEST_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          TEST_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
          TEST_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}

          # Razorpay Test Mode (optional — skips Razorpay tests if not set)
          TEST_RAZORPAY_KEY_ID: ${{ secrets.TEST_RAZORPAY_KEY_ID }}
          TEST_RAZORPAY_KEY_SECRET: ${{ secrets.TEST_RAZORPAY_KEY_SECRET }}

      # ── 8. Upload failure artifacts ───────────────────────────
      #    If a test fails, GitHub saves the video + screenshot
      #    as a downloadable artifact on the Actions page
      - name: Upload test failure artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-failure-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

      # ── 9. Upload full HTML report ────────────────────────────
      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 7
