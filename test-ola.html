<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ola Maps API Local Test</title>
  <style>
    body { font-family: monospace; background: #121212; color: #fff; padding: 20px; }
    h1 { border-bottom: 1px solid #333; padding-bottom: 10px; }
    .test-box { background: #1e1e1e; padding: 20px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #333; }
    pre { background: #000; padding: 15px; border-radius: 5px; overflow-x: auto; color: #0f0; }
    button { padding: 10px 20px; background: #7C3AED; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    button:hover { background: #6D28D9; }
  </style>
</head>
<body>

  <h1>🗺️ Ola Maps API Local Test</h1>

  <div class="test-box">
    <h2>1. Places Autocomplete Test</h2>
    <p>Searching for: <strong>"Park Street"</strong></p>
    <button onclick="testAutocomplete()">Run Autocomplete API</button>
    <pre id="ac-result">Waiting to run...</pre>
  </div>

  <div class="test-box">
    <h2>2. Routing / Distance Test</h2>
    <p>Calculating route from Bakery to Destination (Howrah Bridge)</p>
    <button onclick="testRouting()">Run Routing API</button>
    <pre id="rt-result">Waiting to run...</pre>
  </div>

  <script>
    // Hardcoded from .env
    const API_KEY = 'oLdkeQRfJtU9lI6tfON3r9ipD3wKoB2axUqrwYvG';
    const ORIGIN = '22.5723792,88.4937961';

    async function testAutocomplete() {
      const resBox = document.getElementById('ac-result');
      resBox.textContent = 'Fetching data...';
      try {
        const input = 'Park Street';
        const url = `https://api.olamaps.io/places/v1/autocomplete?input=${encodeURIComponent(input)}&api_key=${API_KEY}`;
        
        const res = await fetch(url, {
          headers: { 'X-Request-Id': 'local-html-test-' + Math.random() }
        });
        
        const data = await res.json();
        resBox.textContent = `STATUS: ${res.status} ${res.ok ? 'OK' : 'ERROR'}\n\nRESPONSE:\n${JSON.stringify(data, null, 2)}`;
      } catch (err) {
        resBox.textContent = `❌ NETWORK/JS ERROR:\n${err.message}`;
      }
    }

    async function testRouting() {
      const resBox = document.getElementById('rt-result');
      resBox.textContent = 'Fetching data...';
      try {
        const destination = '22.5851,88.3468'; 
        const url = `https://api.olamaps.io/routing/v1/directions?origin=${ORIGIN}&destination=${destination}&api_key=${API_KEY}`;
        
        const res = await fetch(url, { method: 'POST' });
        const data = await res.json();
        
        let extraInfo = '';
        if (res.ok && data.routes && data.routes.length > 0) {
          const dist = (data.routes[0].legs[0].distance / 1000).toFixed(2);
          extraInfo = `\n✅ SUCCESS! Distance: ${dist} km\n`;
        } else if (res.ok) {
          extraInfo = '\n❌ FAIL: Status is OK, but routes array is missing or empty.\n';
        }

        resBox.textContent = `STATUS: ${res.status} ${res.ok ? 'OK' : 'ERROR'}${extraInfo}\n\nRESPONSE:\n${JSON.stringify(data, null, 2)}`;
      } catch (err) {
        resBox.textContent = `❌ NETWORK/JS ERROR:\n${err.message}`;
      }
    }
  </script>
</body>
</html>
